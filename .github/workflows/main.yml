name: Deploy API to cPanel

on:
  push:
    branches: [ "main" ]  # ganti kalau branch deploy kamu beda

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install API dependencies
        working-directory: ./
        run: pnpm install --ignore-scripts

      - name: Generate Prisma client (Linux build)
        working-directory: ./
        run: pnpm prisma generate

      # - name: Upload Prisma client to cPanel
      #   uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      #   with:
      #     server: ${{ secrets.FTP_HOST }}
      #     username: ${{ secrets.FTP_USERNAME }}
      #     password: ${{ secrets.FTP_PASSWORD }}
      #     local-dir: ./node_modules/.prisma/
      #     server-dir: /voltmeter.iot-projectkita.com/api/node_modules/.prisma/
      #     dangerous-clean-slate: false

      - name: Upload Prisma @prisma/client to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./node_modules/@prisma/
          server-dir: /voltmeter.iot-projectkita.com/api/node_modules/@prisma/
          dangerous-clean-slate: false

      - name: Upload API source to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /voltmeter.iot-projectkita.com/api/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/*
            **/.github/*
            **/README.md
